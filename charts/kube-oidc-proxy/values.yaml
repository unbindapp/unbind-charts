# Default values for kube-oidc-proxy
replicaCount: 1

image:
  repository: unbindapp/kube-oidc-proxy
  tag: master-13812109543
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: "kube-oidc-proxy"

oidc:
  issuerUrl: "https://unbind.example.com/api/oauth2"
  clientId: "unbind-api"
  usernameClaim: "email"
  groupsClaim: "groups"
  tlsSecretName: "kube-oidc-proxy-tls"

service:
  type: ClusterIP
  port: 443
  targetPort: 443

resources:
  limits:
    cpu: 300m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

rbac:
  create: true
  viewerCreate: true
  viewerGroupName: "oidc:users"